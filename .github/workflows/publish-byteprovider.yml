name: Publish ByteProvider to NuGet

# Trigger: push a tag like `byteprovider/v1.0.1`
# Usage:
#   git tag byteprovider/v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'byteprovider/v*'

  # Allow manual dispatch with an explicit version
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.1)'
        required: true

jobs:
  publish:
    name: Pack + Publish
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: 📦 Restore
        run: dotnet restore Sources/Core/WpfHexEditor.Core.ByteProvider/WpfHexEditor.Core.ByteProvider.csproj --nologo

      - name: 🏗️ Build Release
        run: |
          dotnet build Sources/Core/WpfHexEditor.Core.ByteProvider/WpfHexEditor.Core.ByteProvider.csproj `
            -c Release --nologo -v minimal

      - name: 📦 Pack
        run: |
          dotnet pack Sources/Core/WpfHexEditor.Core.ByteProvider/WpfHexEditor.Core.ByteProvider.csproj `
            -c Release --no-build `
            --output artifacts/nuget
        shell: pwsh

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byteprovider-nuget
          path: artifacts/nuget/WpfHexEditor.Core.ByteProvider*.nupkg
          retention-days: 90

      - name: 🚀 Push to NuGet.org
        run: |
          dotnet nuget push artifacts/nuget/WpfHexEditor.Core.ByteProvider*.nupkg `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
        shell: pwsh

